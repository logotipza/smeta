services:
  backend:
    build: ./backend
    container_name: smeta-backend
    ports:
      - "3001:3001"
    volumes:
      - ./backend:/app
      - /app/node_modules
    environment:
      - PORT=3001
    command: npm run dev

  frontend:
    build: ./frontend
    container_name: smeta-frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - VITE_API_URL=http://localhost:3001
    depends_on:
      - backend
    command: npm run dev
